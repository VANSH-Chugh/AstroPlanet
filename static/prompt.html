<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Prompt</title>

```
<!-- ✅ Critical for mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        background: #0d0d0d;
        color: #f5f5f5;
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 800px;
        margin: auto;
        padding: 20px;
    }

    h2 {
        margin-bottom: 15px;
        font-size: 20px;
    }

    textarea {
        width: 100%;
        min-height: 300px;
        height: 60vh; /* ✅ responsive height */
        background: #111;
        color: #00ffcc;
        border: none;
        border-radius: 12px;
        padding: 15px;
        font-size: 14px;
        resize: none;
        line-height: 1.5;
    }

    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    button {
        flex: 1;
        padding: 14px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
    }

    .copy-btn {
        background: #00c896;
        color: white;
    }

    .home-btn {
        background: #444;
        color: white;
    }

    /* Desktop refinement */
    @media (min-width: 768px) {
        textarea {
            height: 400px;
            font-size: 15px;
        }

        button {
            flex: none;
            width: auto;
            padding: 12px 20px;
        }
    }
</style>
```

</head>

<body>

<div class="container">
    <h2>LLM Prompt</h2>

```
<textarea id="promptText">
```

<!-- KEEP YOUR ORIGINAL PROMPT CONTENT EXACTLY SAME HERE -->

```
</textarea>

<div class="btn-group">
    <button class="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
    <button class="home-btn" onclick="goHome()">Home</button>
</div>
```

</div>

<script>
function copyPrompt() {
    const text = document.getElementById("promptText");

    navigator.clipboard.writeText(text.value)
        .then(() => alert("Copied to clipboard!"))
        .catch(() => alert("Failed to copy"));
}

function goHome() {
    window.location.href = "/";
}
</script>

</body>
</html>
