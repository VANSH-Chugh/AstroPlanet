<!DOCTYPE html>
<html>
<head>
    <title>Astro Generator</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>

<body>

    <div style="text-align:right; margin-bottom:10px;">
    <a href="/prompt">
        <button style="width:auto; padding:8px 14px;">Prompt</button>
    </a>
</div>

<div class="container">
    <h2>Astrology Chart Generator - System h Laadlo</h2>

    <form id="astroForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="dob" placeholder="DD/MM/YYYY" required>
        <input type="text" id="time" placeholder="HH:MM" required>

        <input type="number" step="any" id="lat" placeholder="Latitude (e.g. 26.9124)" required>
        <input type="number" step="any" id="lon" placeholder="Longitude (e.g. 75.7873)" required>

        <button type="submit" id="submitBtn">Generate</button>
    </form>

    <div id="loader" style="display:none;">⏳ Generating your chart...</div>
</div>

<script>
document.getElementById("astroForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");
    const loader = document.getElementById("loader");

    submitBtn.disabled = true;
    loader.style.display = "block";

    const data = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        time: document.getElementById("time").value,
        lat: parseFloat(document.getElementById("lat").value),
        lon: parseFloat(document.getElementById("lon").value)
    };

    try {
        const response = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        // 🔥 Extract filename from backend header
        const disposition = response.headers.get("Content-Disposition");

        let filename = "planetary_data.json";

        if (disposition && disposition.includes("filename=")) {
            filename = disposition.split("filename=")[1].replace(/"/g, "");
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = filename;  // ✅ dynamic filename applied
        a.click();

        loader.style.display = "none";
        submitBtn.disabled = false;

        setTimeout(() => {
            location.reload();
        }, 1000);

    } catch (error) {
        loader.innerText = "❌ Error generating chart";
        submitBtn.disabled = false;
    }
});
</script>

</body>
</html>
